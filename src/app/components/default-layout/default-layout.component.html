<main class="bg-primary-50 min-h-screen text-sm">
  <div class="flex">
    <app-sidebar />
    <div class="w-full px-3">
      <div class="flex justify-between items-center h-16">
        <div>
          <h2 class="text-xl font-medium text-primary-600 py-2">
            Hello, {{ user()?.name }}
          </h2>
        </div>

        <div>
          <div>
            <app-notification
              [message]="(notif.message$ | async) || ''"
              [type]="(notif.type$ | async) || 'success'"
            />
          </div>
        </div>

        <div
          class="flex gap-5 w-1/3 justify-end font-medium text-md items-center"
        >
          <div>
            <i class="fa-solid fa-bell"></i>
          </div>
          <div class="h-9 w-9 border rounded-full">
            <img src="" alt="" />
          </div>
        </div>
      </div>
      <router-outlet></router-outlet>
    </div>
  </div>
</main>
